{% extends "base.html" %}
{% block content %}
<h2>Set up your profile</h2>

{% if form.errors %}
  <div class="error-box">
    <p><strong>Please fix the errors below:</strong></p>
    {{ form.errors }}
  </div>
{% endif %}

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Save and continue</button>
</form>
{% endblock %}
